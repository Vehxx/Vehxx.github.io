<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Isaac's Pics</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(0, 0, 0, 0.96);
      border-bottom: 1px solid #222;
    }

    .header-inner,
    main {
      width: min(100%, 960px);
      margin: 0 auto;
      padding-left: 16px;
      padding-right: 16px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 72px;
      position: relative;
    }

    .site-title {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.25rem);
      font-weight: 100;
      letter-spacing: 0.04em;
      color: #d0d0d0;
    }

    .menu-button {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 48px;
      height: 48px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .menu-button span {
      display: block;
      width: 28px;
      height: 2px;
      margin-left: auto;
      background: #fff;
    }

    .menu-panel {
      position: absolute;
      top: calc(100% - 1px);
      right: 16px;
      display: none;
      min-width: 220px;
      padding: 14px 16px;
      background: #050505;
      border: 1px solid #2b2b2b;
    }

    .menu-panel.open {
      display: block;
    }

    .menu-label {
      margin: 0 0 10px;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8f8f8f;
    }

    .menu-panel a {
      display: block;
      padding: 8px 0;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
    }

    .menu-panel a[aria-current="page"] {
      color: #c3c3c3;
    }

    main {
      padding-top: 24px;
      padding-bottom: 48px;
    }

    .page-heading {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .page-subtitle {
      margin: 8px 0 0;
      color: #b5b5b5;
      letter-spacing: 0.05em;
    }

    hr {
      margin: 20px 0 24px;
      border: 0;
      border-top: 1px solid #222;
    }

    figure {
      margin: 0 0 32px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #111;
      cursor: pointer;
    }

    figcaption {
      padding-top: 10px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: #d0d0d0;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.92);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      width: auto;
      max-width: min(92vw, 1400px);
      max-height: 88vh;
      cursor: default;
    }

    .lightbox button {
      position: absolute;
      top: 16px;
      right: 16px;
      border: 0;
      padding: 0;
      background: transparent;
      color: #fff;
      font: inherit;
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">Iceland</h1>
      <button class="menu-button" id="menu-button" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="menu-panel">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="menu-panel" id="menu-panel" aria-label="Site navigation">
        <p class="menu-label">Iceland</p>
        <a href="index.html" aria-current="page">Isaac's Pics</a>
        <a href="joeys-pics.html">Joey's Pics</a>
      </nav>
    </div>
  </header>
  <main>
    <h2 class="page-heading">Isaac's Pics</h2>
    <p class="page-subtitle">February 25 - March 1</p>
    <hr>
    <figure>
      <img src="images/000040560019.jpg">
      <figcaption>First hike of the trip. We set off for Stein, which means stone in Icelandic. The hike is near Grundarhverfi, Iceland - about a 45 minute drive from Reykjavik. I don't know the name of the mountain in the photo, but it is part of a large volcanic plateau, which Stein is also a part of.</figcaption>
    </figure>
    <figure>
      <img src="images/000040560023.jpg">
      <figcaption>Looking back towards Reykjavik, probably from the same spot that the last picture was taken. In the background you can see the city, as well as a pocket of falling rain.</figcaption>
    </figure>
    <figure>
      <img src="images/000040560024.jpg">
      <figcaption>Near the turn around point for the hike, the big rock in this picture is Stein.</figcaption>
    </figure>
    <figure>
      <img src="images/000040560029.jpg">
      <figcaption>Second hike of the trip, this time further away from the city. This hike was at the Sundhnukusgigar Lava Fields and Geldingadalir Volcano - near Grindavik, Iceland. These lava fields were created in 2021, 2022, and 2023 when the volcano erupted for the first time in hundreds of years. This picture was taken at the start of the hike, near the trailhead.</figcaption>
    </figure>
    <figure>
      <img src="images/000040560030.jpg">
      <figcaption>Some sort of highway barrier with poles sticking out of it. I don't know why this is out here, but my guess is that it was used to block off the area during the eruptions. I like that people have decided to cover the poles in stickers for hiking shops and breweries.</figcaption>
    </figure>
    <figure>
      <img src="images/000040560036.jpg">
      <figcaption>A look out across the snow-covered lava fields - towards the edge of the peninsula.</figcaption>
    </figure>
    <figure>
      <img src="images/000040560037.jpg">
      <figcaption>The hike gets steeper here. The snow is powdery and easy to walk on, a stark contrast to later in the hike where the deeper snow gives way to large patches of ice. Microspikes made this hike (and the hike up Stein) significantly easier.</figcaption>
    </figure>
    <figure>
      <img src="images/000040560038.jpg">
      <figcaption>A look back towards the trailhead, which is around the side of the mountain to the left. At the bottom of this hill you can barely make out the barrier with the poles sticking out from earlier.</figcaption>
    </figure>
    <figure>
      <img src="images/000040570014.jpg">
      <figcaption>These yellow lights are placed every few hundred feet along the trail as you get closer to the volcano. They are to help people stick to the trail during low visibility conditions.</figcaption>
    </figure>
    <figure>
      <img src="images/000040570015.jpg">
      <figcaption>A trail marker.</figcaption>
    </figure>
    <figure>
      <img src="images/000040570028.jpg">
      <figcaption>The snow is all piled up on the same side of each rock. Probably from the wind.</figcaption>
    </figure>
    <figure>
      <img src="images/000040570018.jpg">
      <figcaption>The volcano itself... or at least the biggest vent. There are a number of volcanic vents around this area. This one was smoking from the top when we saw it, although it is very hard to see in this picture - you can just barely make out some smoke on the left side. This was near the place where we turned around, it was about 4.5 miles from the trailhead to this point.</figcaption>
    </figure>
    <figure>
      <img src="images/000040570037.jpg">
      <figcaption>This picture was taken on the way back to the trailhead. Behind the mountains the ocean is visible. On the right side you can see a snowstorm moving in.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580005.jpg">
      <figcaption>The rest of the pictures on this page are all from the same day. This is the day where we drove around the Golden Circle (a circular road network in Iceland) and visited a number of different sites. This is a frozen waterfall in Þingvellir National Park, located in a rift valley between two continental plates. There exist a number of viking ruins here, but they were mostly buried beneath the snow when we were there.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580007.jpg">
      <figcaption>Also located in Þingvellir National Park, this shows the large rock walls on one side of the rift valley.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580008.jpg">
      <figcaption>This is Silfra in Þingvellir National Park. You can snorkel on the top of the water here and see down hundreds of feet into the huge fissures between the tectonic plates.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580012.jpg">
      <figcaption>Gulfoss Waterfall, just an extra 10 minute drive from the main Golden Circle road. The scale of this frozen waterfall is huge and hard to capture on camera. On the left of the image is an observation deck, helping to give some sense of the size.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580013.jpg">
      <figcaption>Another perspective of Gulfoss, taken from the observation deck in the first photo.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580018.jpg">
      <figcaption>Some rocks. Taken at Gulfoss Waterfall but turned around to look at the boring side. For some reason I thought this shot was going to be really good because of the mountains you can barely see in the background. I wasted like 6 of my exposures to try and capture this.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580026.jpg">
      <figcaption>Joey in front of Gulfoss Waterfall looking angry.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580028.jpg">
      <figcaption>Joey in front of Gulfoss Waterfall looking happy.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580030.jpg">
      <figcaption>Me in front of Gulfoss Waterfall looking happy. Photo credit to Joey.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580031.jpg">
      <figcaption>Taken from the rim of Kerið, a dormant volcano that you can climb down into. This is looking towards the rim on the other side, where some other hikers are visible.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580033.jpg">
      <figcaption>I wonder how this selfie turned out.</figcaption>
    </figure>
    <figure>
      <img src="images/000040580034.jpg">
      <figcaption>Joey looking happy in front of Kerið</figcaption>
    </figure>
    <figure>
      <img src="images/000040580035.jpg">
      <figcaption>A sign telling people not to walk on the frozen lake in the center of the volcanic crater feat. people walking on the frozen lake. I also walked on it.</figcaption>
    </figure>
  </main>
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button type="button" id="lightbox-close" aria-label="Close image">X</button>
    <img id="lightbox-image" src="" alt="">
  </div>
  <script>
    const menuButton = document.getElementById("menu-button");
    const menuPanel = document.getElementById("menu-panel");
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const closeButton = document.getElementById("lightbox-close");
    const galleryImages = document.querySelectorAll("main figure img");

    function closeMenu() {
      menuPanel.classList.remove("open");
      menuButton.setAttribute("aria-expanded", "false");
    }

    function toggleMenu() {
      const isOpen = menuPanel.classList.toggle("open");
      menuButton.setAttribute("aria-expanded", String(isOpen));
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
      lightboxImage.alt = "";
    }

    menuButton.addEventListener("click", (event) => {
      event.stopPropagation();
      toggleMenu();
    });

    document.addEventListener("click", (event) => {
      if (!menuPanel.contains(event.target) && event.target !== menuButton) {
        closeMenu();
      }
    });

    galleryImages.forEach((image) => {
      image.addEventListener("click", () => {
        lightboxImage.src = image.src;
        lightboxImage.alt = image.alt;
        lightbox.classList.add("open");
        lightbox.setAttribute("aria-hidden", "false");
      });
    });

    closeButton.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeMenu();
        if (lightbox.classList.contains("open")) {
          closeLightbox();
        }
      }
    });
  </script>
</body>
</html>

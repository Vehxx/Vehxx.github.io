<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Joey's Pics</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(0, 0, 0, 0.96);
      border-bottom: 1px solid #222;
    }

    .header-inner,
    main {
      width: min(100%, 960px);
      margin: 0 auto;
      padding-left: 16px;
      padding-right: 16px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 72px;
      position: relative;
    }

    .site-title {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.25rem);
      font-weight: 100;
      letter-spacing: 0.04em;
      color: #d0d0d0;
    }

    .menu-button {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 48px;
      height: 48px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .menu-button span {
      display: block;
      width: 28px;
      height: 2px;
      margin-left: auto;
      background: #fff;
    }

    .menu-panel {
      position: absolute;
      top: calc(100% - 1px);
      right: 16px;
      display: none;
      min-width: 220px;
      padding: 14px 16px;
      background: #050505;
      border: 1px solid #2b2b2b;
    }

    .menu-panel.open {
      display: block;
    }

    .menu-label {
      margin: 0 0 10px;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8f8f8f;
    }

    .menu-panel a {
      display: block;
      padding: 8px 0;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
    }

    .menu-panel a[aria-current="page"] {
      color: #c3c3c3;
    }

    main {
      padding-top: 24px;
      padding-bottom: 48px;
    }

    .page-heading {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .page-subtitle {
      margin: 8px 0 0;
      color: #b5b5b5;
      letter-spacing: 0.05em;
    }

    hr {
      margin: 20px 0 24px;
      border: 0;
      border-top: 1px solid #222;
    }

    figure {
      margin: 0 0 32px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #111;
      cursor: pointer;
    }

    figcaption {
      padding-top: 10px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: #d0d0d0;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.92);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      width: auto;
      max-width: min(92vw, 1400px);
      max-height: 88vh;
      cursor: default;
    }

    .lightbox button {
      position: absolute;
      top: 16px;
      right: 16px;
      border: 0;
      padding: 0;
      background: transparent;
      color: #fff;
      font: inherit;
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">Iceland</h1>
      <button class="menu-button" id="menu-button" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="menu-panel">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="menu-panel" id="menu-panel" aria-label="Site navigation">
        <p class="menu-label">Iceland</p>
        <a href="index.html">Isaac's Pics</a>
        <a href="joeys-pics.html" aria-current="page">Joey's Pics</a>
      </nav>
    </div>
  </header>
  <main>
    <h2 class="page-heading">Joey's Pics</h2>
    <p class="page-subtitle">February 25 - March 1</p>
    <hr>
    <figure>
      <img src="images/000040560019.jpg" alt="Joey's Iceland photo 1">
      <figcaption>This is actually Isaac's image - stolen valor</figcaption>
    </figure>
  </main>
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button type="button" id="lightbox-close" aria-label="Close image">X</button>
    <img id="lightbox-image" src="" alt="">
  </div>
  <script>
    const menuButton = document.getElementById("menu-button");
    const menuPanel = document.getElementById("menu-panel");
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const closeButton = document.getElementById("lightbox-close");
    const galleryImages = document.querySelectorAll("main figure img");

    function closeMenu() {
      menuPanel.classList.remove("open");
      menuButton.setAttribute("aria-expanded", "false");
    }

    function toggleMenu() {
      const isOpen = menuPanel.classList.toggle("open");
      menuButton.setAttribute("aria-expanded", String(isOpen));
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
      lightboxImage.alt = "";
    }

    menuButton.addEventListener("click", (event) => {
      event.stopPropagation();
      toggleMenu();
    });

    document.addEventListener("click", (event) => {
      if (!menuPanel.contains(event.target) && event.target !== menuButton) {
        closeMenu();
      }
    });

    galleryImages.forEach((image) => {
      image.addEventListener("click", () => {
        lightboxImage.src = image.src;
        lightboxImage.alt = image.alt;
        lightbox.classList.add("open");
        lightbox.setAttribute("aria-hidden", "false");
      });
    });

    closeButton.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeMenu();
        if (lightbox.classList.contains("open")) {
          closeLightbox();
        }
      }
    });
  </script>
</body>
</html>
